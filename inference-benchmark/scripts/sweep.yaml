  - { host: 3090,  model: Llama-3.1-70B,  tp: 8, mode: single, preset: single_large, max_len: 4096, gpu_mem: 0.92, concurrencies: [1, 10, 20, 40, 80, 120, 160], profiles: [chat-short, chat-medium] }

  # === More 2080Ti vllm cells — 2026-04-24 ===
